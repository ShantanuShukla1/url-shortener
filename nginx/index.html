<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>shortn.online</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; }
    p { color: #94a3b8; margin-top: 0; }
    .card {
      background: #1e293b;
      padding: 2rem;
      border-radius: 12px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    input {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      box-sizing: border-box;
      margin-bottom: 0.75rem;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #2563eb; }
    #result {
      margin-top: 1rem;
      word-break: break-all;
      font-size: 0.95rem;
    }
    #result a { color: #60a5fa; }
  </style>
</head>
<body>
  <div class="card">
    <h1>shortn.online</h1>
    <p>Paste a long URL, get a short one.</p>
    <input id="urlInput" type="text" placeholder="https://example.com/very/long/url" />
    <button onclick="shorten()">Shorten</button>
    <div id="result"></div>
  </div>

  <script>
    async function shorten() {
      const input = document.getElementById('urlInput').value.trim();
      const resultDiv = document.getElementById('result');
      resultDiv.textContent = '';

      if (!input) {
        resultDiv.textContent = 'Please enter a URL.';
        return;
      }

      try {
        const res = await fetch('/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ original_url: input })
        });

        if (!res.ok) throw new Error('Failed to shorten URL');

        const data = await res.json();
        const shortUrl = `${window.location.origin}/${data.short_code}`;
        resultDiv.innerHTML = `Short link: <a href="${shortUrl}" target="_blank">${shortUrl}</a>`;
      } catch (err) {
        resultDiv.textContent = 'Something went wrong. Try again.';
      }
    }
  </script>
</body>
</html>
